version: "2.2"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

services:

  # ─── Node Exporter ───────────────────────────────────────────
  # Сервер метрикаларын жинайды (CPU, RAM, Disk, Network)
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # ─── Prometheus ──────────────────────────────────────────────
  # Метрикаларды жинап, time-series базасына сақтайды
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - node_exporter

  # ─── Alertmanager ────────────────────────────────────────────
  # Prometheus-тен алерт алып, Telegram-ға жібереді
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - monitoring

  # ─── Grafana ─────────────────────────────────────────────────
  # Метрикаларды графикке айналдырады (Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=kpunep2747
      - GF_SECURITY_ADMIN_PASSWORD=admin2747
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ─── Loki ────────────────────────────────────────────────────
  # Логтарды жинап сақтайды (Grafana-да көруге болады)
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - monitoring

  # ─── Promtail ────────────────────────────────────────────────
  # Сервер логтарын жинап Loki-ге жібереді
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - monitoring
    depends_on:
      - loki

  # ─── Admin Bot ───────────────────────────────────────────────
  # /status командасымен сервер жағдайын Telegram арқылы көрсетеді
  admin_bot:
    build: ./admin_bot
    container_name: admin_bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=8729682156:AAHiFJAI1FRpcAkOygpA2E-HRjQNZdb0YfQ
      - PROMETHEUS_URL=http://prometheus:9090
    networks:
      - monitoring
    depends_on:
      - prometheus
