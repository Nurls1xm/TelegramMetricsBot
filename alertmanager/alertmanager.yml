global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "telegram"

receivers:
  - name: "telegram"
    telegram_configs:
      - bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
        chat_id: 123456789
        message: |
          ⚠️ *Server Alert*
          *{{ .GroupLabels.alertname }}*
          {{ range .Alerts }}
          📌 {{ .Annotations.summary }}
          {{ .Annotations.description }}
          🔴 Severity: {{ .Labels.severity }}
          {{ end }}
        parse_mode: "Markdown"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
